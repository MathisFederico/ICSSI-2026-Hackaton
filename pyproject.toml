[tool.uv.workspace]
members = [
    "altendor",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "ruff>=0.4",
    "ty>=0.0.14",
    "pre-commit>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--durations=10"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "ANN"]
ignore = ["E501"]

[tool.ty.environment]
python-version = "3.12"
